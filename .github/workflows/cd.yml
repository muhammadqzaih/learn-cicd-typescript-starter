name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Docker Image
        run: |
          gcloud builds submit \
          --tag us-central1-docker.pkg.dev/project-5201dc2c-ebbb-4808-911/notely-ar-repo/notely:latest .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Migrations
        run: npm run db:migrate

      - name: Deploy to Cloud Run
        run: |
          printf 'DATABASE_URL: "%s"\n' "$DATABASE_URL" > env.yaml
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/project-5201dc2c-ebbb-4808-911/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project project-5201dc2c-ebbb-4808-911 \
            --max-instances=4 \
            --env-vars-file=env.yaml
